<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <header>
            <h1>The Tracker</h1>
        </header>
        <div id="total-box">
            <h3>Total Balance</h3>
            <h1 id="total">₦ 0</h1>
        </div>

        <div id="form-box">
            <h3>Add New Expense</h3>

            <form id="form">
                <div class="input-box">
                    <label>Description</label>
                    <input 
                        type="text" 
                        id="desc" 
                        placeholder="What did you care for?" 
                        required
                    >
                </div>

                <div class="input-box">
                    <label>Amount</label>
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="Enter amount" 
                        required
                    >
                </div>

                <div class="input-box">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="">Select category</option>
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Entertainment</option>
                        <option>Relaxation</option>
                        <option>Other</option>
                    </select>
                </div>

                <button>Add Expense</button>
            </form>
        </div>

        <div id="history-box">
            <h3>Expense History</h3>
            <ul id="list"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
